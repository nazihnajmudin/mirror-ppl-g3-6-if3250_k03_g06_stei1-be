image: docker:24.0.5

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

services:
  - docker:24.0.5-dind

stages:
  - build
  - test
  - deploy

build-job:
  stage: build
  image: node:latest
  script:
    - npm install
  artifacts:
    paths:
      - node_modules/

run_tests:
  stage: test
  script:
    - docker compose up -d postgres-db
    - npm test
    - docker compose down

deploy-job:
  stage: deploy
  environment: production
  script:
    - docker compose up -d --build
  only:
    - main