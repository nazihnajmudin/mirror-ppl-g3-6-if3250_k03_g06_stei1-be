image: docker:24.0.5

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

services:
  - docker:24.0.5-dind

stages:
  - build
  - test
  - staging
  - deploy

build-job:
  stage: build
  image: node:20-alpine
  script:
    - npm install
  artifacts:
    paths:
      - node_modules/

run_tests:
  stage: test
  image: node:20-alpine
  script:
    - npm install
    - npx prisma generate
    - npm run test

migrate_database:
  stage: staging
  image: node:20-alpine
  script:
    - npm install
    - npx prisma generate
    - npx prisma migrate deploy
  only:
    - develop

deploy-job:
  stage: deploy
  environment: production
  script:
    - docker compose up -d --build
  only:
    - main