image: docker:24.0.5

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""

services:
  - docker:24.0.5-dind

stages:
  - build
  - test
  - staging
  - deploy

cache:
  paths:
    - node_modules/

build-backend:
  stage: build
  image: node:20-alpine
  tags:
    - docker
  script:
    - cd if3250_k03_g06_stei1-be
    - npm ci
  artifacts:
    expire_in: 1 hour
    paths:
      - if3250_k03_g06_stei1-be/node_modules/

test-backend:
  stage: test
  image: node:20-alpine
  tags:
    - docker
  services:
    - postgres:15-alpine
  variables:
    POSTGRES_DB: stei_akreditasi
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stei_akreditasi
  script:
    - cd if3250_k03_g06_stei1-be
    - npm ci
    - npx prisma generate
    - npx jest --runInBand

migrate-database:
  stage: staging
  image: node:20-alpine
  tags:
    - docker
  script:
    - cd if3250_k03_g06_stei1-be
    - npm ci
    - npx prisma generate
    - npx prisma migrate deploy
  environment:
    name: staging
  only:
    - develop

# ==================== DEPLOY JOBS ====================

deploy-production:
  stage: deploy
  image: docker:24.0.5
  tags:
    - docker
  environment:
    name: production
  script:
    - cd if3250_k03_g06_stei1-be
    - docker compose up -d --build
  only:
    - main