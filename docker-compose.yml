version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: stei_akreditasi_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-stei_akreditasi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-stei_akreditasi}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: stei_akreditasi_be
    restart: always
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      postgres-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres-db:5432/${POSTGRES_DB:-stei_akreditasi}
      PORT: ${PORT:-8000}
      NODE_ENV: ${NODE_ENV:-development}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      API_URL: ${API_URL:-http://localhost:8000}
      JWT_SECRET: ${JWT_SECRET:-supersecretkey}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-supersecretrefreshkey}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-30d}
      SESSION_SECRET: ${SESSION_SECRET:-sessionsecret}
      SSO_BASE_URL: ${SSO_BASE_URL:-https://sso.itb.ac.id}
      SSO_CLIENT_ID: ${SSO_CLIENT_ID:-PLACEHOLDER}
      SSO_CLIENT_SECRET: ${SSO_CLIENT_SECRET:-PLACEHOLDER}
      SSO_CALLBACK_URL: ${SSO_CALLBACK_URL:-http://localhost:8000/api/auth/callback}
      
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-supabase}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_BUCKET_NAME: ${SUPABASE_BUCKET_NAME:-dokumen-akreditasi}

volumes:
  pgdata: